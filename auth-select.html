<!DOCTYPE html>
<html>
<head>
  <title>Login Portal - AP_Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      overflow:hidden;
      color:white;
    }

    /* Floating Glow Background */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:350px;
      height:350px;
      border-radius:50%;
      filter:blur(120px);
      animation:float 8s infinite alternate ease-in-out;
      z-index:0;
    }

    body::before{
      background:#00c6ff;
      top:-100px;
      left:-100px;
    }

    body::after{
      background:#ff416c;
      bottom:-100px;
      right:-100px;
      animation-delay:3s;
    }

    @keyframes float{
      from{ transform:translateY(0px); }
      to{ transform:translateY(40px); }
    }

    .box{
      position:relative;
      z-index:1;
      width:360px;
      padding:50px 40px;
      border-radius:18px;
      text-align:center;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 25px 60px rgba(0,0,0,0.6);
      animation:fadeUp 1s ease forwards;
      opacity:0;
      transform:translateY(40px);
    }

    @keyframes fadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h2{
      margin-bottom:35px;
      font-weight:600;
      letter-spacing:1px;
      position:relative;
    }

    h2::after{
      content:"";
      width:60px;
      height:3px;
      background:#00c6ff;
      display:block;
      margin:10px auto 0;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:14px;
      margin:15px 0;
      font-size:16px;
      cursor:pointer;
      border:none;
      border-radius:30px;
      font-weight:600;
      transition:all 0.35s ease;
      position:relative;
      overflow:hidden;
      color:white;
    }

    .user-btn{
      background:linear-gradient(135deg,#00c6ff,#0072ff);
    }

    .admin-btn{
      background:linear-gradient(135deg,#ff416c,#ff4b2b);
    }

    /* Shine hover animation */
    button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.2);
      transition:0.4s;
    }

    button:hover::before{
      left:100%;
    }

    button:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 30px rgba(0,0,0,0.4);
    }

    button:active{
      transform:scale(0.96);
    }

  </style>
</head>
<body>

<div class="box">
  <h2>Welcome to AP_Code</h2>

  <button class="user-btn" onclick="goUser()">User Section</button>
  <button class="admin-btn" onclick="goAdmin()">Admin Section</button>
</div>

<script>
  function goUser(){
    window.location.href="user-auth.html";
  }

  function goAdmin(){
    window.location.href="admin-login.html";
  }
</script>

</body>
</html>
