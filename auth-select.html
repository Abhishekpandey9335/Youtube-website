<!DOCTYPE html>
<html>
<head>
  <title>Login Portal - AP_Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0b1220, #020409 70%);
    color: #e5e7eb;
  }

  .auth-card {
    width: 360px;
    padding: 38px 32px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
  }

  .auth-card h2 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #60a5fa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #94a3b8;
    margin-bottom: 28px;
  }

  .auth-card input {
    width: 100%;
    padding: 13px 14px;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: #f8fafc;
    outline: none;
  }

  .auth-card button {
    width: 100%;
    padding: 13px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #60a5fa, #38bdf8);
    color: #020409;
    font-weight: 600;
    cursor: pointer;
  }

  .auth-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 0.85rem;
    color: #cbd5e1;
  }

  .auth-footer a {
    color: #38bdf8;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="auth-card">
  <h2>Welcome Back</h2>
  <p class="auth-subtitle">Login to continue learning 👋</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="auth-footer">
    Don’t have an account?
    <a href="register.html">Sign Up</a>
  </div>
</div>
<script>
  function goUser(){
    window.location.href="user-auth.html";
  }

  function goAdmin(){
    window.location.href="admin-login.html";
  }

</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    emailjs.init("EKYJm-uQSNoL0x4uD");

    const form = document.getElementById("loginForm");

    form.addEventListener("submit", function(e){
        e.preventDefault();

        let email = document.getElementById("email").value.trim();

        if(email === ""){
            alert("Enter Email");
            return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];

        if(!users.includes(email)){
            users.push(email);
            localStorage.setItem("users", JSON.stringify(users));

            emailjs.send("service_j1whly6", "template_gn8wxzh", {
                user_email: email
            }).then(function(response) {
                console.log("Email Sent Successfully");
            }, function(error) {
                console.log("Email Failed:", error);
            });
        }

        localStorage.setItem("currentUser", email);

        alert("Login Successful");
        window.location.href = "home.html";
    });

});
</script>

</body>
</html>
